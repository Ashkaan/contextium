name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for PII patterns
        shell: bash
        run: |
          echo "Checking for potential PII..."
          FOUND=0

          # Check for email patterns (excluding example.com and placeholders)
          if grep -rEi '[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|net|org|io|me|dev)' \
            --include="*.md" \
            --exclude-dir=".git" \
            . | grep -vE '(example\.com|your-email|you@|user@|placeholder)'; then
            echo "::warning::Potential email addresses found"
            FOUND=1
          fi

          # Check for IP addresses (private ranges)
          if grep -rE '10\.\d{1,3}\.\d{1,3}\.\d{1,3}' \
            --include="*.md" \
            --exclude-dir=".git" \
            . | grep -vE '(10\.x\.x\.x|10\.0\.0\.0|example)'; then
            echo "::warning::Potential private IP addresses found"
            FOUND=1
          fi

          # Check for 1Password references with real vault names
          if grep -rE 'op://' \
            --include="*.md" \
            --exclude-dir=".git" \
            . | grep -vE '(YOUR_VAULT|your-vault|example|VaultName|AI/|Vault/)'; then
            echo "::warning::Potential 1Password references found"
            FOUND=1
          fi

          if [[ "$FOUND" -eq 1 ]]; then
            echo "::error::PII check found potential issues. Review the warnings above."
            exit 1
          fi

          echo "PII check passed."

      - name: Validate structure
        shell: bash
        run: |
          echo "Validating repo structure..."
          MISSING=0

          for f in CLAUDE.md LICENSE CONTRIBUTING.md CHANGELOG.md install.sh \
                   docs/getting-started.md docs/architecture.md docs/onboarding-guide.md \
                   preferences/user/preferences.md preferences/rules/README.md \
                   apps/README.md projects/README.md journal/README.md \
                   knowledge/README.md integrations/README.md; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            fi
          done

          if [[ "$MISSING" -eq 1 ]]; then
            exit 1
          fi

          echo "Structure validation passed."

      - name: Lint shell scripts
        run: |
          echo "Running shellcheck on install.sh..."
          shellcheck install.sh
          echo "Shell lint passed."

      - name: Scan for secrets
        run: |
          echo "Scanning for secrets..."
          # Use git grep patterns for common secret formats
          FOUND=0
          if grep -rE '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36})' \
            --include="*.sh" --include="*.md" --include="*.yml" \
            --exclude-dir=".git" .; then
            echo "::error::Potential secrets found"
            FOUND=1
          fi
          if [[ "$FOUND" -eq 1 ]]; then
            exit 1
          fi
          echo "Secret scan passed."

      - name: Check markdown links
        shell: bash
        run: |
          echo "Checking for broken internal links..."
          BROKEN=0

          # Extract local file links from markdown and verify they exist
          while IFS= read -r link; do
            # Strip anchors
            file="${link%%#*}"
            if [[ -n "$file" ]] && [[ ! -e "$file" ]]; then
              echo "::warning::Potentially broken link: $link"
              BROKEN=1
            fi
          done < <(grep -rhoP '\[.*?\]\(((?!https?://|#).*?)\)' --include="*.md" . | \
            grep -oP '\(([^)]+)\)' | tr -d '()' | sort -u)

          if [[ "$BROKEN" -eq 1 ]]; then
            echo "::warning::Some internal links may be broken. Review the warnings above."
          fi
          echo "Link check complete."
