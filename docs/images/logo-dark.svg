<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="tealgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Stacked Layers Mark -->
  <g transform="translate(8, 10)">
    <!-- Bottom layer -->
    <rect x="0" y="68" width="90" height="22" rx="5" fill="white" opacity="0.15"/>
    <!-- Middle layer -->
    <rect x="10" y="38" width="70" height="22" rx="5" fill="white" opacity="0.3"/>
    <!-- Top layer (teal) -->
    <rect x="20" y="8" width="50" height="22" rx="5" fill="url(#tealgrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="116" y="78" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">context<tspan fill="url(#tealgrad)">ium</tspan></text>
</svg>
